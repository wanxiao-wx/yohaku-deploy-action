name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-workflow]

permissions: write-all
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HASH_FILE: build_hash
  SOURCE_REPO: innei-dev/Yohaku
  BUILD_COMMAND: pnpm --filter @yohaku/web build:ci
  STANDALONE_SUBPATH: standalone/apps/web
  DEPLOY_BASE_DIR: /opt/yohaku

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    if: ${{ github.event.head_commit.message != 'Update hash file' }}
    outputs:
      hash_content: ${{ steps.read_hash.outputs.hash_content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Read HASH_FILE content
        id: read_hash
        run: |
          content=$(cat ${{ env.HASH_FILE }}) || true
          echo "hash_content=$content" >> "$GITHUB_OUTPUT"

  check:
    name: Check Should Rebuild
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      canceled: ${{ steps.use_content.outputs.canceled }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          lfs: true
          submodules: recursive
      - name: Use content from prev job and compare
        id: use_content
        env:
          FILE_HASH: ${{ needs.prepare.outputs.hash_content }}
        run: |
          file_hash=$FILE_HASH
          current_hash=$(git rev-parse --short HEAD)
          echo "File Hash: $file_hash"
          echo "Current Git Hash: $current_hash"
          if [ "$file_hash" == "$current_hash" ]; then
            echo "Hashes match. Stopping workflow."
            echo "canceled=true" >> "$GITHUB_OUTPUT"
          else
            echo "Hashes do not match. Continuing workflow."
          fi

  build:
    name: Build artifact
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.canceled != 'true' }}
    strategy:
      matrix:
        node-version: [lts/*]
    outputs:
      sha_short: ${{ steps.store.outputs.sha_short }}
      branch: ${{ steps.store.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          lfs: true
          submodules: recursive
      - name: Checkout LFS objects
        run: git lfs checkout
      - uses: pnpm/action-setup@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - uses: jongwooo/next-cache@v1
      - name: Install dependencies
        run: pnpm install
      - name: Configure Mix Space admin URL
        run: |
          perl -0pi -e 's#atom<string \| null>\(null\)#atom<string | null>(process.env.NEXT_PUBLIC_ADMIN_URL ?? null)#' apps/web/src/atoms/url.ts
          grep -F 'NEXT_PUBLIC_ADMIN_URL' apps/web/src/atoms/url.ts
      - name: Build project
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          NEXT_PUBLIC_ADMIN_URL: ${{ secrets.NEXT_PUBLIC_ADMIN_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GATEWAY_URL: ${{ secrets.NEXT_PUBLIC_GATEWAY_URL }}
        run: |
          ${{ env.BUILD_COMMAND }}
          cd apps/web/.next
          rm -rf cache
          cp -r ../public ./standalone/public
          mv ./static ./standalone/apps/web/.next/static
          cd ./standalone
          echo ';process.title = "Yohaku (NextJS)"' >> server.js
          cd "$GITHUB_WORKSPACE"
          mkdir -p assets
          rm -f assets/release.zip
          (cd apps/web/.next && zip --symlinks -r "$GITHUB_WORKSPACE/assets/release.zip" ./* -x "dev/*" -x "cache/*")
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: yohaku-release
          path: assets/release.zip
          retention-days: 1
      - name: Cache Build Artifacts
        id: cache-primes
        uses: actions/cache/save@v4
        with:
          path: assets
          key: ${{ github.run_number }}-release
      - name: Store artifact commit version
        shell: bash
        id: store
        run: |
          sha_short=$(git rev-parse --short HEAD)
          branch_name=$(git rev-parse --abbrev-ref HEAD)
          echo "sha_short=$sha_short" >> "$GITHUB_OUTPUT"
          echo "branch=$branch_name" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy artifact
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy by remote artifact download
        env:
          SSH_HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.USER }}
          SSH_PASSWORD: ${{ secrets.PASSWORD }}
          SSH_PORT: ${{ secrets.PORT }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          STANDALONE_SUBPATH: ${{ env.STANDALONE_SUBPATH }}
          DEPLOY_BASE_DIR: ${{ env.DEPLOY_BASE_DIR }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass
          SSH_BASE="sshpass -p $SSH_PASSWORD ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/yohaku_known_hosts -p $SSH_PORT $SSH_USER@$SSH_HOST"
          $SSH_BASE "RUN_NUMBER='$RUN_NUMBER' RUN_ID='$RUN_ID' STANDALONE_SUBPATH='$STANDALONE_SUBPATH' DEPLOY_BASE_DIR='$DEPLOY_BASE_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          GH_PAT='${{ secrets.GH_PAT }}'
          basedir="$DEPLOY_BASE_DIR"
          workdir="$basedir/releases/$RUN_NUMBER"
          mkdir -p "$workdir" "$basedir/.cache" "$basedir/releases"
          if ! command -v unzip >/dev/null 2>&1; then
            apt-get update
            apt-get install -y unzip
          fi
          artifacts_json="$workdir/artifacts.json"
          artifact_archive="$workdir/yohaku-release-artifact.zip"
          curl -fsSL \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/wanxiao-wx/yohaku-deploy-action/actions/runs/$RUN_ID/artifacts?per_page=100" \
            -o "$artifacts_json"
          archive_url=$(python3 - "$artifacts_json" <<'PY'
          import json, sys
          data = json.load(open(sys.argv[1]))
          for artifact in data.get('artifacts', []):
              if artifact.get('name') == 'yohaku-release':
                  print(artifact['archive_download_url'])
                  break
          else:
              raise SystemExit('yohaku-release artifact not found')
          PY
          )
          curl -fL \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "$archive_url" \
            -o "$artifact_archive"
          mkdir -p "$workdir/artifact"
          unzip -qq -o "$artifact_archive" -d "$workdir/artifact"
          mv "$workdir/artifact/release.zip" "$workdir/release.zip"
          cd "$workdir"
          unzip -qq -o "$workdir/release.zip"
          rm -rf "$workdir/artifact" "$artifact_archive" "$artifacts_json" "$workdir/release.zip"
          rm -rf "$workdir/$STANDALONE_SUBPATH/.env"
          ln -s "$basedir/.env" "$workdir/$STANDALONE_SUBPATH/.env"
          mkdir -p "$workdir/$STANDALONE_SUBPATH/.next"
          rm -rf "$workdir/$STANDALONE_SUBPATH/.next/cache"
          ln -s "$basedir/.cache" "$workdir/$STANDALONE_SUBPATH/.next/cache"
          ln -sfn "$workdir/$STANDALONE_SUBPATH" "$basedir/current"
          ln -sfn "$basedir/current/server.js" "$basedir/server.js"
          find "$basedir/releases" -mindepth 1 -maxdepth 1 -type d | sort -Vr | tail -n +6 | xargs -r rm -rf
          echo "Deployed artifact to $basedir/current"
          echo "Start it from 1Panel with: node /opt/yohaku/server.js"
          REMOTE
      - name: After deploy script
        run: |
          hash=${{ needs.build.outputs.sha_short }}
          ${{ secrets.AFTER_DEPLOY_SCRIPT }}

  store:
    name: Store artifact commit version
    runs-on: ubuntu-latest
    needs: [deploy, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Use outputs from build
        env:
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
          BRANCH: ${{ needs.build.outputs.branch }}
        run: |
          echo "SHA Short from build: $SHA_SHORT"
          echo "Branch from build: $BRANCH"
      - name: Write hash to file
        env:
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
        run: echo "$SHA_SHORT" > ${{ env.HASH_FILE }}
      - name: Commit files
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ${{ env.HASH_FILE }}
          git commit -m "Update hash file"
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
