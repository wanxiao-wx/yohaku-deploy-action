name: Build and Deploy

on:
  push:
    branches:
      - main
  # schedule:
  #   - cron: '0 3 * * *'

  repository_dispatch:
    types: [trigger-workflow]

permissions: write-all
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HASH_FILE: build_hash
  SOURCE_REPO: innei-dev/Yohaku
  BUILD_COMMAND: pnpm --filter @yohaku/web build:ci
  STANDALONE_SUBPATH: standalone/apps/web

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    if: ${{ github.event.head_commit.message != 'Update hash file' }}

    outputs:
      hash_content: ${{ steps.read_hash.outputs.hash_content }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Read HASH_FILE content
        id: read_hash
        run: |
          content=$(cat ${{ env.HASH_FILE }}) || true
          echo "hash_content=$content" >> "$GITHUB_OUTPUT"
  check:
    name: Check Should Rebuild
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      canceled: ${{ steps.use_content.outputs.canceled }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: innei-dev/Yohaku
          token: ${{ secrets.GH_PAT }} # `GH_PAT` is a secret that contains your PAT
          fetch-depth: 0
          lfs: true
          submodules: recursive

      - name: Use content from prev job and compare
        id: use_content
        env:
          FILE_HASH: ${{ needs.prepare.outputs.hash_content }}
        run: |
          file_hash=$FILE_HASH
          current_hash=$(git rev-parse --short HEAD)
          echo "File Hash: $file_hash"
          echo "Current Git Hash: $current_hash"
          if [ "$file_hash" == "$current_hash" ]; then
            echo "Hashes match. Stopping workflow."
            echo "canceled=true" >> $GITHUB_OUTPUT
          else
            echo "Hashes do not match. Continuing workflow."
          fi

  build:
    name: Build artifact
    runs-on: ubuntu-latest
    needs: check
    if: ${{needs.check.outputs.canceled != 'true'}}

    strategy:
      matrix:
        node-version: [lts/*]
    outputs:
      sha_short: ${{ steps.store.outputs.sha_short }}
      branch: ${{ steps.store.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.GH_PAT }} # `GH_PAT` is a secret that contains your PAT
          fetch-depth: 0
          lfs: true
          submodules: recursive

      - name: Checkout LFS objects
        run: git lfs checkout
      - uses: pnpm/action-setup@v2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - uses: jongwooo/next-cache@v1
      - name: Install dependencies
        run: pnpm install
      - name: Build project
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GATEWAY_URL: ${{ secrets.NEXT_PUBLIC_GATEWAY_URL }}
        run: |
          ${{ env.BUILD_COMMAND }}
          cd apps/web/.next
          rm -rf cache
          cp -r ../public ./standalone/public
          mv ./static ./standalone/apps/web/.next/static
          cd ./standalone
          echo ';process.title = "Yohaku (NextJS)"' >> server.js
          cd "$GITHUB_WORKSPACE"
          mkdir -p assets
          rm -f assets/release.zip
          (cd apps/web/.next && zip --symlinks -r "$GITHUB_WORKSPACE/assets/release.zip" ./* -x "dev/*" -x "cache/*")

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: yohaku-release
          path: assets/release.zip
          retention-days: 1
      - name: Cache Build Artifacts
        id: cache-primes
        uses: actions/cache/save@v4
        with:
          path: assets
          key: ${{ github.run_number }}-release

      - name: Store artifact commit version
        shell: bash
        id: store
        run: |
          sha_short=$(git rev-parse --short HEAD)
          branch_name=$(git rev-parse --abbrev-ref HEAD)
          echo "sha_short=$sha_short" >> "$GITHUB_OUTPUT"
          echo "branch=$branch_name" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy artifact
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy by remote artifact download
        env:
          SSH_HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.USER }}
          SSH_PASSWORD: ${{ secrets.PASSWORD }}
          SSH_PORT: ${{ secrets.PORT }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          STANDALONE_SUBPATH: ${{ env.STANDALONE_SUBPATH }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass
          SSH_BASE="sshpass -p $SSH_PASSWORD ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/yohaku_known_hosts -p $SSH_PORT $SSH_USER@$SSH_HOST"
          $SSH_BASE "RUN_NUMBER='$RUN_NUMBER' RUN_ID='$RUN_ID' STANDALONE_SUBPATH='$STANDALONE_SUBPATH' bash -s" <<'REMOTE'
          set -euo pipefail
          GH_PAT='${{ secrets.GH_PAT }}'
          basedir=$HOME/yohaku
          workdir=$basedir/$RUN_NUMBER
          mkdir -p "$workdir" "$basedir/.cache"
          cat > "$basedir/ecosystem.config.js" <<'PM2CFG'
          module.exports = {
            apps: [
              {
                name: 'Yohaku',
                script: './server.js',
                cwd: __dirname,
                exec_mode: 'fork',
                instances: 1,
                autorestart: true,
                watch: false,
                max_memory_restart: '180M',
                env: {
                  NODE_ENV: 'production',
                  HOSTNAME: '0.0.0.0',
                  PORT: process.env.PORT || 2323,
                },
                log_date_format: 'YYYY-MM-DD HH:mm:ss',
                merge_logs: true,
              },
            ],
          }
          PM2CFG
          artifacts_json="$workdir/artifacts.json"
          artifact_archive="$workdir/yohaku-release-artifact.zip"
          curl -fsSL             -H "Authorization: Bearer $GH_PAT"             -H "Accept: application/vnd.github+json"             "https://api.github.com/repos/wanxiao-wx/yohaku-deploy-action/actions/runs/$RUN_ID/artifacts?per_page=100"             -o "$artifacts_json"
          archive_url=$(python3 - "$artifacts_json" <<'PY'
          import json, sys
          data = json.load(open(sys.argv[1]))
          for artifact in data.get('artifacts', []):
              if artifact.get('name') == 'yohaku-release':
                  print(artifact['archive_download_url'])
                  break
          else:
              raise SystemExit('yohaku-release artifact not found')
          PY
          )
          curl -fL             -H "Authorization: Bearer $GH_PAT"             -H "Accept: application/vnd.github+json"             "$archive_url"             -o "$artifact_archive"
          mkdir -p "$workdir/artifact"
          unzip -qq -o "$artifact_archive" -d "$workdir/artifact"
          mv "$workdir/artifact/release.zip" "$workdir/release.zip"
          cd "$workdir"
          unzip -qq -o "$workdir/release.zip"
          rm -rf "$workdir/artifact" "$artifact_archive" "$artifacts_json" "$curl_config"
          rm -rf "$workdir/$STANDALONE_SUBPATH/.env"
          ln -s "$HOME/yohaku/.env" "$workdir/$STANDALONE_SUBPATH/.env"
          export NEXT_SHARP_PATH="$(npm root -g)/sharp"
          ln -sf "$workdir/$STANDALONE_SUBPATH/server.js" "$basedir/server.js"
          mkdir -p "$workdir/$STANDALONE_SUBPATH/.next"
          rm -rf "$workdir/$STANDALONE_SUBPATH/.next/cache"
          ln -sf "$basedir/.cache" "$workdir/$STANDALONE_SUBPATH/.next/cache"
          cd "$basedir"
          if pm2 describe Yohaku >/dev/null 2>&1; then
            pm2 reload ecosystem.config.js --update-env
          else
            pm2 start ecosystem.config.js --update-env
          fi
          rm "$workdir/release.zip"
          pm2 save
          echo "Deployed successfully"
          REMOTE

      - name: After deploy script
        run: |
          hash=${{ needs.build.outputs.sha_short }}
          ${{ secrets.AFTER_DEPLOY_SCRIPT }}

  store:
    name: Store artifact commit version
    runs-on: ubuntu-latest
    needs: [deploy, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
          fetch-depth: 0 # otherwise, you will failed to push refs to dest repo
      # Get the commit version from the build job
      - name: Use outputs from build
        env:
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
          BRANCH: ${{ needs.build.outputs.branch }}
        run: |
          echo "SHA Short from build: $SHA_SHORT"
          echo "Branch from build: $BRANCH"
      - name: Write hash to file
        env:
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}

        run: echo $SHA_SHORT > ${{ env.HASH_FILE }}
      - name: Commit files
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ${{ env.HASH_FILE }}
          git commit -a -m "Update hash file"
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
